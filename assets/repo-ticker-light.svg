        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">awesome-claude-code-tool...</text>
      </g>
      <!-- Repo: alejandrobalderas/claude-code-from-source -->
      <g transform="translate(3000, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude-code-from-source</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">alejandrobalderas</text>
        <text x="366" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 1.7K ⭐ +13</text>
      </g>
      <!-- Repo: ponponon/claude_code_src -->
      <g transform="translate(3300, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">ponponon</text>
        <text x="258" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 2.2K ⭐ +2</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude_code_src</text>
      </g>
      <!-- Repo: ChinaSiro/claude-code-sourcemap -->
      <g transform="translate(3600, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude-code-sourcemap</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">ChinaSiro</text>
        <text x="270" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 9.0K ⭐ +13</text>
      </g>
      <!-- Repo: pengchengneo/Claude-Code -->
